// ---- Excel parsing ----
function findCol(headers,candidates){
  for(const c of candidates){
    const i=headers.findIndex(h=>String(h).replace(/\s/g,'').includes(c));
    if(i>=0)return i;
  }
  return -1;
}

function guessCategory(typeName){
  const d=['폐유','폐산','알칼리','유기용제','석면','폐농약','의료','폐페인트','폐합성고분자','폐촉매','폐흡착제','PCB','할로겐','폐수은','폐카드뮴'];
  return d.some(k=>typeName.includes(k))?'지정':'일반';
}

async function parseExcel(file){
  const ab=await file.arrayBuffer();
  const wb=XLSX.read(ab,{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const allRows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});

  // Find header row (search first 20 rows for key column names)
  let headerIdx=-1;
  for(let i=0;i<Math.min(allRows.length,20);i++){
    const joined=allRows[i].map(c=>String(c)).join('');
    if(joined.includes('처리자업체명')||joined.includes('위탁량')||joined.includes('처리업체명')){
      headerIdx=i;break;
    }
  }
  if(headerIdx<0)throw new Error('헤더를 찾을 수 없습니다.\n처리자업체명 또는 위탁량 열이 필요합니다.');

  const headers=allRows[headerIdx].map(h=>String(h).trim());

  const iDate=findCol(headers,['배출자인계일자','인계일자','처리일자','위탁일자','처리완료일자','완료일자']);
  const iType=findCol(headers,['폐기물명','폐기물종류명','폐기물종류','품목명','종류명']);
  const iCompany=findCol(headers,['처리자업체명','처리업체명','업체명','처리자명']);
  const iQty=findCol(headers,['위탁량','수량','처리량','중량','위탁중량','발생량']);
  const iCat=findCol(headers,['지정폐기물여부','폐기물분류','분류구분','지정여부','구분']);

  if(iCompany<0)throw new Error('처리자업체명 열을 찾을 수 없습니다.');
  if(iQty<0)throw new Error('위탁량 열을 찾을 수 없습니다.');

  const dataRows=allRows.slice(headerIdx+1).filter(r=>r.some(c=>String(c).trim()!==''));

  // Detect month from 배출자인계일자
  const monthCounts={};
  if(iDate>=0){
    dataRows.forEach(r=>{
      const d=String(r[iDate]||'');
      const m=d.match(/(\d{4})[.\-\/년\s](\d{1,2})/);
      if(m){const key=`${m[1]}-${String(m[2]).padStart(2,'0')}`;monthCounts[key]=(monthCounts[key]||0)+1;}
    });
  }
  const sortedMonths=Object.entries(monthCounts).sort((a,b)=>b[1]-a[1]);
  const detectedYm=sortedMonths.length?sortedMonths[0][0]:null;
  const multipleMonths=sortedMonths.length>1;

  // Aggregate: typeCompanyData[typeName][companyName] = tonnage
  const typeCompanyData={};
  const typeCategories={};

  dataRows.forEach(r=>{
    const company=String(r[iCompany]||'').trim();
    if(!company)return;
    const qtyStr=String(r[iQty]||'0').replace(/,/g,'').replace(/[^\d.]/g,'');
    const qty=parseFloat(qtyStr)||0;
    if(qty<=0)return;
    const typeName=iType>=0?String(r[iType]||'').trim():'기타';
    if(!typeName)return;
    const cat=iCat>=0?(String(r[iCat]||'').includes('지정')?'지정':'일반'):guessCategory(typeName);

    if(!typeCompanyData[typeName])typeCompanyData[typeName]={};
    typeCompanyData[typeName][company]=(typeCompanyData[typeName][company]||0)+qty;
    if(!typeCategories[typeName])typeCategories[typeName]=cat;
  });

  const allQtys=Object.values(typeCompanyData).flatMap(cd=>Object.values(cd));
  const total=allQtys.reduce((s,v)=>s+v,0);

  return{detectedYm,multipleMonths,typeCompanyData,typeCategories,rows:dataRows.length,total};
}

// ---- Firestore helpers ----
const DB=()=>window.__db;
const FS=()=>window.__fs;

async function fsLoad(){
  const{collection,doc,getDocs,getDoc}=FS(),db=DB();
  const[mSnap,aSnap,sSnap]=await Promise.all([
    getDocs(collection(db,'months')),
    getDocs(collection(db,'allocations')),
    getDoc(doc(db,'settings','main'))
  ]);
  const monthData={},uploads={},loaded=[];
  mSnap.forEach(d=>{
    const v=d.data();
    monthData[d.id]={typeCompanyData:v.typeCompanyData||{},rows:v.rows||0,at:v.at||''};
    uploads[d.id]={rows:v.rows||0,at:v.at||''};
    loaded.push(d.id);
  });
  loaded.sort();
  const matrixByMonth={};
  aSnap.forEach(d=>{matrixByMonth[d.id]=d.data().matrix;});
  let depts=INIT_DEPTS.slice(),types=[],companies=[],presets=[];
  if(sSnap.exists()){
    const s=sSnap.data();
    if(s.depts?.length)depts=s.depts;
    if(s.types?.length)types=s.types;
    if(s.companies?.length)companies=s.companies;
    if(s.presets?.length)presets=s.presets;
  }
  // Reconstruct types & companies from monthData if missing from settings
  if(!types.length||!companies.length){
    const typeMap={};const companySet=new Set();
    Object.values(monthData).forEach(({typeCompanyData:tcd})=>{
      Object.entries(tcd||{}).forEach(([typeName,byCompany])=>{
        if(!typeMap[typeName])typeMap[typeName]=guessCategory(typeName);
        Object.keys(byCompany||{}).forEach(cn=>{if(cn)companySet.add(cn);});
      });
    });
    if(!types.length&&Object.keys(typeMap).length)types=Object.entries(typeMap).map(([name,cat])=>({name,cat}));
    if(!companies.length&&companySet.size)companies=[...companySet].map(name=>({name}));
    // Persist reconstructed data back to settings so next load is fast
    if(types.length||companies.length){
      const{doc:d2,setDoc:sd}=FS();
      sd(d2(db,'settings','main'),{depts,presets,types,companies}).catch(()=>{});
    }
  }
  return{monthData,uploads,loaded,matrixByMonth,depts,types,companies,presets};
}

async function fsDeleteMonth(ym){const{doc,deleteDoc}=FS();await deleteDoc(doc(DB(),'months',ym));}
async function fsSaveAlloc(ym,matrix){const{doc,setDoc}=FS();await setDoc(doc(DB(),'allocations',ym),{matrix});}
async function fsSaveSettings(depts,presets,types,companies){
  const{doc,setDoc}=FS();await setDoc(doc(DB(),'settings','main'),{depts,presets,types,companies});
}

// ---- SVG Charts ----
function LineSVG({pts}){
  const w=1140,h=270,pl=46,pr=24,pt=26,pb=34;
  const n=pts.length,dense=n>14;
  const iw=w-pl-pr,ih=h-pt-pb;
  const max=Math.max(...pts.map(p=>p.value),1),top=Math.ceil(max/20)*20||20;
  const X=i=>pl+iw*(n>1?i/(n-1):0.5);
  const Y=v=>pt+ih*(1-v/top);
  const els=[];
  for(let g=0;g<=4;g++){
    const gy=pt+ih*g/4,val=Math.round(top*(1-g/4));
    els.push(<line key={`gl${g}`} x1={pl} x2={w-pr} y1={gy} y2={gy} stroke="#EEF0F2" strokeWidth={1}/>);
    els.push(<text key={`gt${g}`} x={pl-9} y={gy+4} textAnchor="end" fontSize={11} fill="#AEB3BA">{val}</text>);
  }
  pts.forEach((p,i)=>{
    if(dense&&!(i===0||i===n-1||i%3===0))return;
    els.push(<text key={`xl${i}`} x={X(i)} y={h-11} textAnchor="middle" fontSize={dense?10:11} fill="#9CA1A8" fontWeight={600}>{p.label}</text>);
  });
  if(n>1){
    const d=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
    els.push(<path key="ln" d={d} fill="none" stroke={ACCENT} strokeWidth={2.4} strokeLinejoin="round" strokeLinecap="round"/>);
  }
  pts.forEach((p,i)=>{
    els.push(<circle key={`c${i}`} cx={X(i)} cy={Y(p.value)} r={dense?2.8:4.6} fill="#fff" stroke={ACCENT} strokeWidth={dense?2:2.6}/>);
    if(!dense)els.push(<text key={`v${i}`} x={X(i)} y={Y(p.value)-13} textAnchor="middle" fontSize={11.5} fontWeight={700} fill="#2B2F36">{p.value.toFixed(1)}</text>);
  });
  return <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{display:'block',height:'auto'}}>{els}</svg>;
}

function DonutSVG({data}){
  const size=170,r=62,cx=85,cy=85,sw=24,C=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let off=0;
  const arcs=data.map((d,i)=>{
    const len=C*(d.value/total);
    const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={PAL[i%PAL.length]} strokeWidth={sw} strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt"/>;
    off+=len;return el;
  });
  return(
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F0F1F3" strokeWidth={sw}/>
      {arcs}
      <text x={cx} y={cy-4} textAnchor="middle" fontSize={12} fill="#9CA1A8">처리업체</text>
      <text x={cx} y={cy+19} textAnchor="middle" fontSize={22} fontWeight={800} fill="#1B1E24">{data.length}곳</text>
    </svg>
  );
}

function GaugeSVG(){
  const size=128,r=50,cx=64,cy=64,sw=13,C=2*Math.PI*r,pct=0.92;
  return(
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F0F1F3" strokeWidth={sw}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={ACCENT} strokeWidth={sw} strokeLinecap="round" strokeDasharray={`${C*pct} ${C}`} transform={`rotate(-90 ${cx} ${cy})`}/>
      <text x={cx} y={cy-2} textAnchor="middle" fontSize={26} fontWeight={800} fill="#1B1E24">92%</text>
      <text x={cx} y={cy+18} textAnchor="middle" fontSize={10.5} fill="#9CA1A8" fontWeight={600}>처리 진행률</text>
    </svg>
  );
}

function Icon({name,size=18}){
  const s=(ch)=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round">{ch}</svg>;

    case 'upload':return s([<path key={1} d="M12 16V4"/>,<polyline key={2} points="7 9 12 4 17 9"/>,<path key={3} d="M4 20h16"/>]);
    case 'history':return s([<rect key={1} x={4} y={4} width={16} height={5} rx={1.5}/>,<rect key={2} x={4} y={11} width={16} height={5} rx={1.5}/>,<line key={3} x1={7} y1={19.5} x2={13} y2={19.5}/>]);
    case 'dashboard':return s([<rect key={1} x={4} y={4} width={7} height={7} rx={1.5}/>,<rect key={2} x={13} y={4} width={7} height={7} rx={1.5}/>,<rect key={3} x={4} y={13} width={7} height={7} rx={1.5}/>,<rect key={4} x={13} y={13} width={7} height={7} rx={1.5}/>]);
    case 'company':return s([<line key={0} x1={4} y1={20} x2={20} y2={20}/>,<rect key={1} x={5} y={12} width={3.4} height={6}/>,<rect key={2} x={10.3} y={8} width={3.4} height={10}/>,<rect key={3} x={15.6} y={14} width={3.4} height={4}/>]);
    case 'type':return s([<circle key={1} cx={12} cy={12} r={8}/>,<path key={2} d="M12 4a8 8 0 0 1 8 8h-8z" fill="currentColor" stroke="none" opacity={0.35}/>]);
    case 'alloc':return s([<rect key={1} x={4} y={4} width={16} height={16} rx={2}/>,<line key={2} x1={4} y1={10} x2={20} y2={10}/>,<line key={3} x1={4} y1={15} x2={20} y2={15}/>,<line key={4} x1={12} y1={10} x2={12} y2={20}/>]);
    case 'dept':return s([<circle key={1} cx={8} cy={8} r={3}/>,<circle key={2} cx={16.5} cy={9} r={2.4}/>,<path key={3} d="M3 20c0-3 2.3-5 5-5s5 2 5 5"/>,<path key={4} d="M14.5 20c0-2.2 1.4-4 3.4-4"/>]);
    case 'report':return s([<path key={1} d="M7 3h7l4 4v14H7z"/>,<line key={2} x1={10} y1={12} x2={15} y2={12}/>,<line key={3} x1={10} y1={16} x2={15} y2={16}/>]);
    case 'guide':return s([<circle key={1} cx={12} cy={12} r={8}/>,<path key={2} d="M12 8v8M8 12h8"/>]);
    default:return s(<circle cx={12} cy={12} r={8}/>);
  }
}

                    <div style={{display:'flex',alignItems:'baseline',gap:'14px',borderBottom:'1px solid #F2F3F5',paddingBottom:'12px'}}><span style={{fontSize:'11px',color:'#9CA1A8',width:'96px',flexShrink:0}}>Display / 46·800</span><span style={{fontSize:'32px',fontWeight:800,letterSpacing:'-1px'}}>807.3 t</span></div>
                    <div style={{display:'flex',alignItems:'baseline',gap:'14px',borderBottom:'1px solid #F2F3F5',paddingBottom:'12px'}}><span style={{fontSize:'11px',color:'#9CA1A8',width:'96px',flexShrink:0}}>Title / 18·800</span><span style={{fontSize:'18px',fontWeight:800}}>요약 대시보드</span></div>
                    <div style={{display:'flex',alignItems:'baseline',gap:'14px',borderBottom:'1px solid #F2F3F5',paddingBottom:'12px'}}><span style={{fontSize:'11px',color:'#9CA1A8',width:'96px',flexShrink:0}}>Body / 13·500</span><span style={{fontSize:'13px',fontWeight:500,color:'#3B4048'}}>처리업체별 위탁량 비중과 추이를 분석합니다.</span></div>
                    <div style={{display:'flex',alignItems:'baseline',gap:'14px'}}><span style={{fontSize:'11px',color:'#9CA1A8',width:'96px',flexShrink:0}}>Label / 11·600</span><span style={{fontSize:'11px',fontWeight:600,color:'#888E96',letterSpacing:'.3px'}}>선택 조건 총 위탁량</span></div>
                  </div>
                </div>
                <div style={{background:'#fff',border:'1px solid #E8EAED',borderRadius:'16px',padding:'24px',boxShadow:'0 1px 2px rgba(16,18,23,.04)',display:'flex',alignItems:'center',gap:'24px'}}>
                  <div style={{flexShrink:0}}><GaugeSVG/></div>
                  <div>
                    <div style={{fontSize:'15px',fontWeight:700,marginBottom:'8px'}}>데이터 시각화</div>
                    <div style={{fontSize:'12.5px',color:'#6B717A',lineHeight:1.7}}>원형 게이지·도넛, 라인·막대 차트로 위탁량을 표현합니다. 라인 차트를 추이의 기본으로, 도넛/막대는 구성비에 사용합니다.</div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ══ PLACEHOLDER ══ */}
          {isPlaceholder&&(
            <div style={{maxWidth:'760px',margin:'48px auto 0'}}>
              <div style={{background:'#fff',border:'1px solid #E8EAED',borderRadius:'18px',padding:'48px 44px',boxShadow:'0 1px 2px rgba(16,18,23,.04)',textAlign:'center'}}>
                <div style={{width:'64px',height:'64px',borderRadius:'16px',background:'#FDEEE6',color:ACCENT,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}><Icon name={screen} size={30}/></div>
                <div style={{fontSize:'20px',fontWeight:800,letterSpacing:'-.3px'}}>{(PLACEHOLDER[screen]||{}).title}</div>
                <div style={{fontSize:'13.5px',color:'#6B717A',lineHeight:1.7,marginTop:'12px',maxWidth:'480px',marginLeft:'auto',marginRight:'auto'}}>{(PLACEHOLDER[screen]||{}).desc}</div>
                <div style={{display:'inline-flex',alignItems:'center',gap:'8px',marginTop:'24px',background:'#F3F4F6',borderRadius:'999px',padding:'9px 16px',fontSize:'12px',color:'#7C828A',fontWeight:600}}>
                  <span style={{width:'7px',height:'7px',borderRadius:'50%',background:'#C7CCD3',display:'inline-block'}}/>이번 디자인 범위: 디자인 시스템 · 요약 대시보드 · 발생 부서 배분 입력
                </div>
              </div>
            </div>
          )}

        </div>
      </main>

      {openFilter&&<div onClick={closeFilter} style={{position:'fixed',inset:0,zIndex:20}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
